<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc Mừng Sinh Nhật Mẹ 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ffd1dc,#ffe6b3);
}

.phone{
  width:100%;
  max-width:420px;
  aspect-ratio:9/16;
  border-radius:40px;
  overflow:hidden;
  position:relative;
  box-shadow:0 30px 60px rgba(0,0,0,0.25);
}

/* ===== SCREEN ===== */
.screen{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:30px;
  transition:opacity 0.6s ease;
}

.hidden{
  opacity:0;
  pointer-events:none;
}

/* ===== INTRO ===== */
.intro{
  background: linear-gradient(135deg,#ffc1cc,#ffe4b5,#fff0f5);
  background-size:300% 300%;
  animation: gradientMove 12s ease infinite;
  overflow:hidden;
}

@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.card{
  width:85%;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.35);
  padding:50px 30px;
  border-radius:30px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
  color:#d6336c;
}

.title{
  font-size:22px;
  font-weight:700;
}

.subtitle{
  margin-top:12px;
  font-size:15px;
  color:#8a2d52;
}

.date{
  margin-top:8px;
  font-size:14px;
  opacity:0.8;
}

.btn{
  margin-top:30px;
  padding:14px 35px;
  border:none;
  border-radius:40px;
  background:linear-gradient(135deg,#ff4e88,#ff85a2);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 15px 35px rgba(255,46,110,0.4);
}

.btn:hover{
  transform:scale(1.05);
}

/* ===== SLIDESHOW ===== */
.slideshow{
  position:absolute;
  inset:0;
  overflow:hidden;
}

.slide{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:opacity 1.2s ease-in-out;
}

.slide.active{
  opacity:1;
}

/* text overlay */
.slide-text{
  position:absolute;
  bottom:80px;
  width:100%;
  text-align:center;
  color:white;
  font-size:18px;
  font-weight:600;
  text-shadow:0 0 15px rgba(0,0,0,0.8);
}

/* icon float */
.icon{
  position:absolute;
  bottom:-20px;
  font-size:22px;
  animation: floatIcon linear infinite;
  opacity:0.8;
}

@keyframes floatIcon{
  from{
    transform:translateY(0) scale(1);
    opacity:0.8;
  }
  to{
    transform:translateY(-120vh) scale(1.6);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="phone">

<!-- INTRO -->
<div class="screen intro" id="intro">
  <div class="card">
    <div class="title">🎂 Chúc Mừng Sinh Nhật Mẹ 🎂</div>
    <div class="date">28 – 02 💐</div>
    <div class="subtitle">Mẹ là ánh nắng dịu dàng nhất trong cuộc đời con 💖</div>
    <button class="btn" onclick="start()">Mở Lời Chúc 💝</button>
  </div>
</div>

<!-- SLIDESHOW -->
<div class="screen slideshow hidden" id="slideshow">

  <div class="slide active" style="background-image:url('img1.jpg')">
    <div class="slide-text">🌸 Cảm ơn mẹ đã luôn hi sinh vì con</div>
  </div>

  <div class="slide" style="background-image:url('img2.jpg')">
    <div class="slide-text">💖 Mẹ là điều tuyệt vời nhất</div>
  </div>

  <div class="slide" style="background-image:url('img3.jpg')">
    <div class="slide-text">✨ Tuổi mới nhiều sức khỏe</div>
  </div>

  <div class="slide" style="background-image:url('img4.jpg')">
    <div class="slide-text">🌷 Nhiều niềm vui và hạnh phúc</div>
  </div>

  <div class="slide" style="background-image:url('img5.jpg')">
    <div class="slide-text">💝 Con yêu mẹ rất nhiều</div>
  </div>

</div>

<audio id="music" src="audio.mp3" loop></audio>

</div>

<script>
let intro=document.getElementById("intro");
let slideshow=document.getElementById("slideshow");
let slides=document.querySelectorAll(".slide");
let music=document.getElementById("music");
let current=0;

// NHẠC bật lần click đầu
function playMusicOnce(){
  music.play();
  document.removeEventListener("click", playMusicOnce);
}
document.addEventListener("click", playMusicOnce);

// CHUYỂN MÀN
function start(){
  intro.classList.add("hidden");
  slideshow.classList.remove("hidden");
  startSlideshow();
}

// SLIDESHOW
function startSlideshow(){
  setInterval(()=>{
    slides[current].classList.remove("active");
    current = (current + 1) % slides.length;
    slides[current].classList.add("active");
  }, 4000);
}

// ICON BAY INTRO
let icons=["💖","🌸","💐","✨","🎂"];
setInterval(()=>{
  let icon=document.createElement("div");
  icon.classList.add("icon");
  icon.innerText=icons[Math.floor(Math.random()*icons.length)];
  icon.style.left=Math.random()*100+"%";
  icon.style.animationDuration=(4+Math.random()*4)+"s";
  intro.appendChild(icon);
  setTimeout(()=>icon.remove(),7000);
},600);
</script>

</body>
</html>
